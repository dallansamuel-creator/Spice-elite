<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Midnight Cravings</title>
    <style>
        body { margin: 0; background: #000; color: #ff4500; font-family: sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; touch-action: none; }
        canvas { border: 2px solid #ff4500; background: #000; max-width: 98vw; max-height: 85vh; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 50; color: #ff8c00; font-weight: bold; font-size: 14px; pointer-events: none; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 100; padding: 20px; }
        button { background: #ff4500; border: none; padding: 15px 30px; font-size: 18px; color: white; font-weight: bold; border-radius: 8px; margin-top: 15px; }
        input { padding: 12px; width: 80%; max-width: 250px; margin-top: 10px; border: 1px solid #ff4500; background: #111; color: white; text-align: center; }
        #joy { position: absolute; width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid #ff4500; visibility: hidden; pointer-events: none; }
        #knob { position: absolute; width: 25px; height: 25px; background: #ff4500; border-radius: 50%; top: 17.5px; left: 17.5px; }
    </style>
</head>
<body>

    <div id="ui">HUNGER: <span id="h">100</span>% | TIME: <span id="t">0</span>s</div>
    <canvas id="c"></canvas>
    <div id="joy"><div id="knob"></div></div>

    <div id="overlay">
        <div id="m1">
            <h1 style="margin:0; color:#ff4500;">MIDNIGHT CRAVINGS</h1>
            <p>Reach the <b>NEON TRUCK</b>.<br>Avoid zombies & red spikes!</p>
            <button onclick="run()">START RITUAL</button>
        </div>
        <div id="m2" style="display:none;">
            <h1 style="color:#0f0; margin:0;">SPICE ELITE!</h1>
            <p>Survival Time: <span id="ft"></span>s</p>
            <input type="email" id="email" placeholder="BYUH Email">
            <button id="sb" onclick="send()">CLAIM BOGO COUPON</button>
        </div>
    </div>

    <script>
        const cvs = document.getElementById('c');
        const ctx = cvs.getContext('2d');
        const joy = document.getElementById('joy');
        const knob = document.getElementById('knob');
        cvs.width = 800; cvs.height = 500;

        let p = {x:60, y:250, r:8}, trk = {x:740, y:250}, en = [], active = false, won = false, hunger = 100, st;
        let mx = 0, my = 0, sx, sy, keys = {};

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        
        window.addEventListener('touchstart', e => {
            if(!active || won) return;
            const t = e.touches[0]; sx = t.clientX; sy = t.clientY;
            joy.style.left = (sx-30)+'px'; joy.style.top = (sy-30)+'px'; joy.style.visibility = 'visible';
        }, {passive:false});
        
        window.addEventListener('touchmove', e => {
            if(!sx) return;
            const t = e.touches[0]; let dx = t.clientX - sx, dy = t.clientY - sy;
            let d = Math.min(30, Math.hypot(dx, dy)); let a = Math.atan2(dy, dx);
            mx = Math.cos(a) * (d/30); my = Math.sin(a) * (d/30);
            knob.style.transform = `translate(${mx*15}px, ${my*15}px)`;
            e.preventDefault();
        }, {passive:false});

        window.addEventListener('touchend', () => { joy.style.visibility='hidden'; mx=0; my=0; });

        function run() {
            document.getElementById('overlay').style.display='none';
            active=true; won=false; hunger=100; p.x=60; p.y=250; st=Date.now(); en=[];
            for(let i=0; i<15; i++) en.push({x:200+Math.random()*500, y:50+Math.random()*400, vx:(Math.random()-0.5)*7, vy:(Math.random()-0.5)*7, i:Math.random()>0.5?'🍕':'🥪'});
            loop();
        }

        function loop() {
            if(!active || won) return;
            if(keys.ArrowUp || keys.KeyW) p.y-=6; if(keys.ArrowDown || keys.KeyS) p.y+=6;
            if(keys.ArrowLeft || keys.KeyA) p.x-=6; if(keys.ArrowRight || keys.KeyD) p.x+=6;
            p.x += mx*7; p.y += my*7;
            
            hunger -= 0.15;
            document.getElementById('h').innerText = Math.floor(hunger);
            document.getElementById('t').innerText = Math.floor((Date.now()-st)/1000);

            if(p.x<15 || p.x>785 || p.y<15 || p.y>485) return die("SPIKED!");
            if(hunger <= 0) return die("STARVED!");
            if(Math.hypot(p.x - trk.x, p.y - trk.y) < 40) { win(); return; }

            ctx.fillStyle="#000"; ctx.fillRect(0,0,800,500);
            ctx.fillStyle="#500"; // Spikes
            for(let i=0; i<800; i+=20){
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i+10,12); ctx.lineTo(i+20,0); ctx.fill();
                ctx.beginPath(); ctx.moveTo(i,500); ctx.lineTo(i+10,488); ctx.lineTo(i+20,500); ctx.fill();
            }

            ctx.font="22px Arial";
            en.forEach(z => {
                z.x += z.vx; z.y += z.vy;
                if(z.x<20 || z.x>780) z.vx*=-1; if(z.y<20 || z.y>480) z.vy*=-1;
                ctx.fillText(z.i, z.x-10, z.y+10);
                if(Math.hypot(p.x-z.x, p.y-z.y) < 20) die("ZOMBIED!");
            });

            ctx.fillStyle="#ff8c00"; ctx.fillRect(trk.x-25, trk.y-25, 50, 50); // Truck
            ctx.fillStyle="#0ff"; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill(); // Player

            requestAnimationFrame(loop);
        }

        function die(m) { active=false; alert(m); location.reload(); }
        function win() { won=true; active=false; document.getElementById('ft').innerText=Math.floor((Date.now()-st)/1000); document.getElementById('m1').style.display='none'; document.getElementById('m2').style.display='block'; document.getElementById('overlay').style.display='flex'; }

        function send() {
            const e = document.getElementById('email').value;
            if(!e.includes('@')) return alert("Use BYUH Email");
            document.getElementById('sb').innerText="SENDING...";
            fetch("https://formspree.io/f/mojpgoqw", {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({email: e, note:"Spice Elite"})
            }).then(() => { alert("Welcome to the Elite!"); location.reload(); });
        }
    </script>
</body>
</html>
